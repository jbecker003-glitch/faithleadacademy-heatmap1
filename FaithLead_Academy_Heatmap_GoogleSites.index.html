<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Faith+Lead Academy — Learner Distribution</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    padding: 24px 32px 32px;
  }
  .header { margin-bottom: 20px; }
  .header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 4px;
  }
  .header p {
    font-size: 12px;
    color: #777;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }
  .stat {
    background: #f4f4f2;
    border-radius: 8px;
    padding: 12px 14px;
  }
  .stat-label {
    font-size: 11px;
    color: #777;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
  }
  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  #us-map { width: 100%; }
  #world-map { width: 100%; }
  .legend {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0 22px;
    font-size: 11px;
    color: #777;
  }
  .legend-swatches { display: flex; gap: 3px; }
  .swatch-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .swatch {
    width: 32px;
    height: 12px;
    border-radius: 2px;
  }
  .swatch-label {
    font-size: 9px;
    color: #999;
  }
  #tooltip {
    display: none;
    position: fixed;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 6px 11px;
    font-size: 12px;
    color: #1a1a1a;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
</style>
</head>
<body>

<div class="header">
  <h1>Faith+Lead Academy — Learner Distribution</h1>
  <p>All courses combined &nbsp;·&nbsp; Data as of June 2026</p>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Total US learners</div>
    <div class="stat-value">606</div>
  </div>
  <div class="stat">
    <div class="stat-label">States represented</div>
    <div class="stat-value">44</div>
  </div>
  <div class="stat">
    <div class="stat-label">International learners</div>
    <div class="stat-value">48</div>
  </div>
  <div class="stat">
    <div class="stat-label">Countries represented</div>
    <div class="stat-value">7</div>
  </div>
</div>

<div class="section-label">US states</div>
<div id="us-map"></div>
<div class="legend">
  <span>Fewer</span>
  <div class="legend-swatches" id="us-legend"></div>
  <span>More</span>
</div>

<div class="section-label">International locations</div>
<div id="world-map"></div>
<div class="legend">
  <span>Fewer</span>
  <div class="legend-swatches" id="world-legend"></div>
  <span>More</span>
</div>

<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const stateData = {
  'Minnesota':135,'Pennsylvania':82,'Arizona':70,'Wisconsin':40,'North Dakota':29,
  'Nebraska':26,'Texas':20,'Iowa':19,'Colorado':16,'Ohio':15,'Missouri':12,
  'California':11,'Washington':14,'Nevada':9,'South Dakota':8,'Montana':8,
  'Alaska':8,'Illinois':7,'Oregon':7,'New York':7,'Virginia':6,'North Carolina':6,
  'Arkansas':6,'Kansas':5,'Idaho':4,'Michigan':4,'Georgia':4,'Indiana':3,
  'New Jersey':3,'Florida':2,'Rhode Island':2,'Maryland':2,'Kentucky':2,
  'South Carolina':2,'Massachusetts':2,'New Mexico':2,'Utah':1,'Vermont':1,
  'West Virginia':1,'Louisiana':1,'Wyoming':1,'Hawaii':1,'Maine':1,'Oklahoma':1
};

const intlData = {
  'Canada':38,'Scotland':4,'Nigeria':2,'Australia':1,'Colombia':1,'Germany':1,'Kenya':1
};

const usColors = ['#dbeafe','#bfdbfe','#93c5fd','#60a5fa','#2563eb','#1e3a8a'];
const intlColors = ['#ede9fe','#c4b5fd','#8b5cf6','#5b21b6'];

const usScale = d3.scaleThreshold()
  .domain([1, 5, 15, 35, 70, 135])
  .range(usColors);

const intlScale = d3.scaleThreshold()
  .domain([1, 2, 5, 38])
  .range(intlColors);

const tip = document.getElementById('tooltip');

function showTip(event, html) {
  tip.innerHTML = html;
  tip.style.display = 'block';
  tip.style.left = (event.clientX + 14) + 'px';
  tip.style.top = (event.clientY - 32) + 'px';
}
function hideTip() { tip.style.display = 'none'; }

const usSvg = d3.select('#us-map').append('svg')
  .attr('viewBox', '0 0 960 500')
  .attr('width', '100%')
  .style('display', 'block');

const usPath = d3.geoPath(d3.geoAlbersUsa().scale(1200).translate([480, 250]));

d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
  usSvg.selectAll('path')
    .data(topojson.feature(us, us.objects.states).features)
    .join('path')
    .attr('d', usPath)
    .attr('stroke', '#ffffff')
    .attr('stroke-width', 0.6)
    .attr('fill', d => {
      const v = stateData[d.properties.name] || 0;
      return v > 0 ? usScale(v) : '#e8e8e4';
    })
    .on('mousemove', function(event, d) {
      const v = stateData[d.properties.name] || 0;
      if (v > 0) showTip(event, `<strong>${d.properties.name}</strong>: ${v} learner${v !== 1 ? 's' : ''}`);
    })
    .on('mouseleave', hideTip);

  const legDiv = document.getElementById('us-legend');
  [
    {label:'1–4', col:usColors[0]},
    {label:'5–14', col:usColors[1]},
    {label:'15–34', col:usColors[2]},
    {label:'35–69', col:usColors[3]},
    {label:'70–134', col:usColors[4]},
    {label:'135+', col:usColors[5]}
  ].forEach(b => {
    legDiv.innerHTML += `<div class="swatch-wrap">
      <div class="swatch" style="background:${b.col}"></div>
      <span class="swatch-label">${b.label}</span>
    </div>`;
  });
});

const worldSvg = d3.select('#world-map').append('svg')
  .attr('viewBox', '0 0 900 440')
  .attr('width', '100%')
  .style('display', 'block');

const proj = d3.geoNaturalEarth1().scale(150).translate([450, 220]);
const worldPath = d3.geoPath(proj);
const numToName = {
  '124':'Canada','566':'Nigeria','036':'Australia',
  '170':'Colombia','276':'Germany','404':'Kenya'
};

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
  worldSvg.selectAll('path')
    .data(topojson.feature(world, world.objects.countries).features)
    .join('path')
    .attr('d', worldPath)
    .attr('stroke', 'rgba(255,255,255,0.5)')
    .attr('stroke-width', 0.3)
    .attr('fill', d => {
      const id = String(d.id).padStart(3, '0');
      const name = numToName[id] || (id === '826' ? 'Scotland' : null);
      if (name && intlData[name]) return intlScale(intlData[name]);
      return '#e4e2de';
    })
    .on('mousemove', function(event, d) {
      const id = String(d.id).padStart(3, '0');
      const rawName = numToName[id] || (id === '826' ? 'United Kingdom (incl. Scotland)' : null);
      if (!rawName) return hideTip();
      const dataName = rawName === 'United Kingdom (incl. Scotland)' ? 'Scotland' : rawName;
      const v = intlData[dataName] || 0;
      if (v > 0) showTip(event, `<strong>${rawName}</strong>: ${v} learner${v !== 1 ? 's' : ''}`);
    })
    .on('mouseleave', hideTip);

  const legDiv2 = document.getElementById('world-legend');
  [
    {label:'1', col:intlColors[0]},
    {label:'2', col:intlColors[1]},
    {label:'3–5', col:intlColors[2]},
    {label:'6+', col:intlColors[3]}
  ].forEach(b => {
    legDiv2.innerHTML += `<div class="swatch-wrap">
      <div class="swatch" style="background:${b.col}"></div>
      <span class="swatch-label">${b.label}</span>
    </div>`;
  });
});
</script>
</body>
</html>
